<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>u r gullible</title>

<style>
body {
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: #ffffff;
    color: #222;
    max-width: 700px;
    margin: 40px auto;
    padding: 0 15px;
}

h1 {
    font-size: 22px;
    margin-bottom: 20px;
}

textarea {
    width: 100%;
    height: 110px;
    padding: 10px;
    margin: 8px 0;
    font-size: 14px;
    border: 1px solid #ccc;
    border-radius: 6px;
    resize: vertical;
}

.buttons {
    display: flex;
    gap: 8px;
    margin: 10px 0;
}

button {
    padding: 8px 14px;
    font-size: 14px;
    border: 1px solid #ccc;
    background: #f5f5f5;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #eaeaea;
}

.footer {
    margin-top: 15px;
    font-size: 12px;
    color: #666;
}
</style>
</head>

<body>

<h1>corny cipher</h1>

<textarea id="inputText" placeholder="Enter text"></textarea>

<div class="buttons">
    <button onclick="encodeText()">Encode</button>
    <button onclick="decodeText()">Decode</button>
</div>

<textarea id="outputText" placeholder="Result"></textarea>

<script>
const encode_map = {0:'g',1:'u',2:'l',3:'L',4:'i',5:'b',6:'B',7:'e'};
const decode_map = {'g':0,'u':1,'l':2,'L':3,'i':4,'b':5,'B':6,'e':7};

function encode(text) {
    let result = "";
    for (let char of text) {
        let base8 = char.charCodeAt(0).toString(8).padStart(3,'0');
        for (let d of base8) result += encode_map[d];
    }
    return result;
}

function decode(cipher) {
    cipher = cipher.replace(/\s/g, "");
    if (cipher.length % 3 !== 0) return "invalid input";

    let result = "";
    for (let i = 0; i < cipher.length; i += 3) {
        let chunk = cipher.slice(i, i+3);
        let digits = "";
        for (let c of chunk) {
            if (!(c in decode_map)) return "invalid character";
            digits += decode_map[c];
        }
        result += String.fromCharCode(parseInt(digits, 8));
    }
    return result;
}

function encodeText() {
    outputText.value = encode(inputText.value);
}

function decodeText() {
    outputText.value = decode(inputText.value);
}

</script>

</body>
</html>
